<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقع شحن الألعاب</title>

<style>
body{
font-family:tahoma;
background:#f5f5f5;
text-align:center;
}

.container{
background:#fff;
width:90%;
max-width:400px;
margin:20px auto;
padding:15px;
border-radius:10px;
}

input,select,button{
width:90%;
padding:10px;
margin:8px 0;
}

button{
background:#25D366;
color:#fff;
border:none;
cursor:pointer;
}

.contact{
margin-top:10px;
font-weight:bold;
color:#333;
}
</style>
</head>

<body>

<div class="container">

<h2>🎮 شحن الألعاب</h2>

<select id="game">
<option>اختر اللعبة</option>
<option>شدات ببجي</option>
<option>فري فاير</option>
</select>

<input type="text" id="id" placeholder="ادخل ID اللاعب">
<input type="number" id="amount" placeholder="الكمية">
<input type="text" id="last4" placeholder="آخر 4 أرقام من التحويل">

<button onclick="sendOrder()">إرسال الطلب</button>

<div class="contact">
📞 للتواصل واتساب: 01116816773
</div>

</div>

<script>

function sendOrder(){

let game=document.getElementById("game").value;
let id=document.getElementById("id").value;
let amount=document.getElementById("amount").value;
let last4=document.getElementById("last4").value;

let order={
game:game,
id:id,
amount:amount,
last4:last4,
date:new Date().toLocaleString()
};

// حفظ الطلب في LocalStorage
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

// إرسال واتساب
let msg=
`🎮 طلب شحن جديد:%0A
اللعبة: ${game}%0A
ID: ${id}%0A
الكمية: ${amount}%0A
آخر 4 أرقام: ${last4}`;

let phone="201116816773";

window.open(`https://wa.me/${phone}?text=${msg}`,"_blank");

alert("تم إرسال الطلب بنجاح ✔️");
}

</script>

</body>
</html>
